<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;font-family:system-ui}
body{margin:0;background:#f4f6ff;padding:12px}

/* TOP */
.top{display:flex;gap:8px;margin-bottom:12px}
.top a{
  flex:1;text-align:center;padding:10px;border-radius:12px;
  color:#fff;text-decoration:none;font-size:13px;font-weight:600;
}
.top a:nth-child(1){background:#4facfe;}
.top a:nth-child(2){background:#43e97b;}
.top a:nth-child(3){background:#f093fb;}

.btn-rekap{
  width:100%;padding:12px;border:none;border-radius:12px;
  background:#222;color:#fff;margin-bottom:10px;font-weight:600;
}

/* SEARCH */
.search input{
  width:100%;padding:12px;border-radius:12px;
  border:1px solid #ddd;font-size:14px;
}
.search-list{
  background:#fff;border-radius:12px;margin-top:4px;
  max-height:200px;overflow:auto;
}
.search-item{
  padding:10px;border-bottom:1px solid #eee;
  cursor:pointer;
}

/* CARD */
.card{
  background:#fff;border-radius:16px;padding:16px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.hide-btn{
  margin-bottom:8px;
  background:#000;color:#fff;
  border:none;padding:6px 10px;border-radius:8px;
}

/* DATA */
.box{
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:600;
}
.nip{background:#e8f1ff;}
.pass{background:#fff3cd;}

.copy-btn{
  border:none;background:#000;color:#fff;
  border-radius:8px;padding:6px 10px;font-size:12px;
}

/* STATUS */
.status{
  margin-top:14px;
  padding:14px;
  border-radius:12px;
  text-align:center;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
}
.today{background:#b388ff;color:#fff;}
.old{background:#43e97b;color:#fff;}
.late{background:#ff4d4d;color:#fff;}

.last{
  margin-top:10px;
  font-size:16px;
  text-align:center;
  font-weight:bold;
}

/* TASK */
.task-title{margin-top:12px;font-weight:600;cursor:pointer}
.task-item{
  background:#f7f9ff;padding:10px;border-radius:8px;
  margin-top:6px;font-size:13px;cursor:pointer;
}

/* NAV */
.nav{display:flex;margin-top:12px}
.nav button{
  flex:1;margin:3px;padding:10px;border:none;
  border-radius:10px;background:#4facfe;color:#fff;
}

/* REKAP */
table{
  width:100%;font-size:13px;border-collapse:collapse;
}
td,th{padding:8px;border-bottom:1px solid #eee}
.row-today{background:#d1c4e9;}
</style>
</head>

<body>

<div class="top">
  <a href="#" target="_blank">INPUT</a>
  <a href="#" target="_blank">JADWAL</a>
  <a href="#" target="_blank">SUKET</a>
</div>

<button class="btn-rekap" onclick="toggleRekap()">📊 REKAP</button>

<div class="search">
  <input type="text" placeholder="Cari nama..." oninput="search(this.value)">
  <div id="searchList" class="search-list"></div>
</div>

<div id="rekapBox" style="display:none"></div>
<div id="app"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyz2FWhSfAiP6xuSjgdDk1p-BRlvvPeJl5W3oXSvxL5TNWHI0eAz7VQ1Wadee_PzqqRpg/exec";

let data=[],index=0,hide=false;

/* LOAD */
fetch(API_URL)
.then(r=>r.json())
.then(r=>{
  data=r;
  render();
});

/* UTIL */
function now(){
  let d=new Date();
  return d.toISOString();
}
function format(t){
  if(!t)return "-";
  let d=new Date(t);
  return d.toLocaleString("id-ID");
}
function todayOnly(){
  return new Date().toISOString().split("T")[0];
}

/* COPY */
function copyText(text,el){
  navigator.clipboard.writeText(text);
  let old=el.innerHTML;
  el.innerHTML="✔";
  setTimeout(()=>el.innerHTML=old,1200);
}

/* ✅ STATUS (INI YANG DIPERBAIKI) */
function toggleDone(nip){
  let t = now();

  // kirim ke Google Sheet (pakai format lama)
  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      nip:nip,
      tanggal:t,
      password:"timawakng"
    })
  });

  // simpan lokal (biar langsung berubah)
  localStorage.setItem("done_"+nip,t);

  render();
}

function getStatus(nip){
  return localStorage.getItem("done_"+nip);
}

/* SEARCH */
function search(v){
  v=v.toLowerCase();
  let list=document.getElementById("searchList");
  list.innerHTML=data.filter(d=>d.nama.toLowerCase().includes(v))
  .map(d=>`<div class="search-item" onclick="goTo('${d.nama}')">${d.nama}</div>`).join("");
}

function goTo(n){
  index=data.findIndex(d=>d.nama===n);
  document.getElementById("rekapBox").style.display="none";
  render();
}

/* REKAP */
function toggleRekap(){
  let box=document.getElementById("rekapBox");
  box.style.display=box.style.display==="block"?"none":"block";
  renderRekap();
}

function renderRekap(){
  document.getElementById("rekapBox").innerHTML=`
  <div class="card">
  <table>
  <tr><th>No</th><th>Nama</th><th>Status</th></tr>
  ${data.map(d=>{
    let t=getStatus(d.nip);
    let isToday=t && t.startsWith(todayOnly());
    return `
    <tr onclick="goTo('${d.nama}')" class="${isToday?'row-today':''}">
      <td>${d.no}</td>
      <td>${d.nama}</td>
      <td>${format(t)}</td>
    </tr>`;
  }).join("")}
  </table></div>`;
}

/* RENDER */
function render(){
  let d=data[index];
  let t=getStatus(d.nip);
  let isToday=t && t.startsWith(todayOnly());

  let statusClass="old";
  if(isToday) statusClass="today";

  document.getElementById("app").innerHTML=`
  <div class="card">

    <button class="hide-btn" onclick="hide=!hide;render()">👁 Hide / Show</button>

    <h3>${hide?'***':d.nama}</h3>

    <div class="box nip">
      ${hide?'********':d.nip}
      <button class="copy-btn" onclick="copyText('${d.nip}',this)">📋</button>
    </div>

    <div class="box pass">
      ${hide?'********':d.password}
      <button class="copy-btn" onclick="copyText('${d.password}',this)">📋</button>
    </div>

    <div class="status ${statusClass}" onclick="toggleDone('${d.nip}')">
      ${t? "Terakhir Input":"Klik untuk input hari ini"}
    </div>

    <div class="last">
      ${format(t)}
    </div>

    <div class="task-title" onclick="toggleTask()">📋 Task</div>
    <div id="taskBox">
      ${task(d.task1)}
      ${task(d.task2)}
      ${task(d.task3)}
    </div>

    <div class="nav">
      <button onclick="prev()">⬅</button>
      <button onclick="next()">➡</button>
    </div>

  </div>`;
}

/* TASK */
function task(v){
  if(!v)return"";
  return `<div class="task-item" onclick="copyTask('${v}',this)">📋 ${v}</div>`;
}

function copyTask(text,el){
  navigator.clipboard.writeText(text);
  let old=el.innerHTML;
  el.innerHTML="✔ "+text;
  setTimeout(()=>el.innerHTML="📋 "+text,1200);
}

function toggleTask(){
  let e=document.getElementById("taskBox");
  e.style.display=e.style.display==="none"?"block":"none";
}

function next(){if(index<data.length-1){index++;render();}}
function prev(){if(index>0){index--;render();}}

</script>

</body>
</html>
