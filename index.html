<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;font-family:system-ui}

body{
  margin:0;
  background:#f5f7ff;
  padding:10px;
}

/* TOP */
.top{
  display:flex;
  gap:6px;
  margin-bottom:10px;
}

.top a{
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:10px;
  color:#fff;
  text-decoration:none;
  font-size:13px;
}

.top a:nth-child(1){background:#4facfe;}
.top a:nth-child(2){background:#43e97b;}
.top a:nth-child(3){background:#f093fb;}

/* SEARCH */
.search input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
}

.search-list{
  background:#fff;
  border-radius:10px;
  margin-top:4px;
  max-height:200px;
  overflow:auto;
  box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.search-item{
  padding:8px;
  border-bottom:1px solid #eee;
  font-size:13px;
  cursor:pointer;
}

/* CARD */
.card{
  background:#fff;
  border-radius:12px;
  padding:14px;
  box-shadow:0 6px 15px rgba(0,0,0,.08);
}

/* HIDDEN HEADER */
.hidden-box{
  text-align:center;
  padding:10px;
  background:#eef3ff;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
}

/* SHOW DATA */
.show-box{
  margin-bottom:10px;
}

.no{
  width:30px;
  height:30px;
  border-radius:50%;
  background:#4facfe;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  margin-bottom:6px;
}

.name{font-weight:bold}
.nip{
  font-size:12px;
  color:#666;
  display:flex;
  justify-content:space-between;
}

/* PASSWORD */
.pass{
  margin-top:10px;
  padding:8px;
  background:#eef3ff;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
}

/* BUTTON */
.btn{
  border:none;
  background:#4facfe;
  color:#fff;
  border-radius:6px;
  padding:4px 7px;
  font-size:11px;
}

/* STATUS */
.status{
  margin-top:10px;
  padding:8px;
  border-radius:8px;
  text-align:center;
  font-size:13px;
  cursor:pointer;
  background:#ddd;
}
.status.done{background:#43e97b;color:#fff}

/* TASK */
.task-title{
  margin-top:10px;
  cursor:pointer;
  color:#4facfe;
}

.task-list{display:none}
.task-item{
  background:#fafbff;
  padding:6px;
  border-radius:6px;
  margin-top:5px;
  font-size:12px;
}

/* NAV */
.nav{
  display:flex;
  margin-top:10px;
}

.nav button{
  flex:1;
  margin:2px;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#4facfe;
  color:#fff;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:#fff;
  padding:8px 14px;
  border-radius:20px;
  opacity:0;
}
.toast.show{opacity:1}
</style>
</head>

<body>

<div class="top">
  <a href="https://aktivitas.kalbarprov.go.id//engine/feature26/data-kinerja/add#TakeOff" target="_blank">INPUT</a>
  <a href="https://epresensi.kalbarprov.go.id/login-general" target="_blank">JADWAL</a>
  <a href="https://script.google.com/macros/s/AKfycbwl9sC1tabi_-BC6vU2KFH1drCGPHwgmgIqNFks_ipCSxFCjH1NyxITPodOC4CWJwjJYQ/exec" target="_blank">SUKET</a>
</div>

<div class="search">
  <input type="text" placeholder="Cari nama..." oninput="search(this.value)">
  <div id="searchList" class="search-list"></div>
</div>

<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzA3HAKr4ALmfHT0hpp3NCeuyp-P5lpZaczMOLyqVX8PZbblJPR7X4ksDvrOSAAQD3JWQ/exec";

let data=[], index=0, showPwd=false, showInfo=false;

/* LOAD */
fetch(API_URL)
.then(r=>r.json())
.then(r=>{data=r;render();});

/* DATE */
function today(){return new Date().toLocaleDateString("id-ID");}
function key(nip){return "done_"+nip;}

function toggleDone(nip){
  const k=key(nip);
  localStorage.getItem(k)?localStorage.removeItem(k):localStorage.setItem(k,today());
  render();
}

function getStatus(nip){return localStorage.getItem(key(nip));}

/* SEARCH */
function search(v){
  v=v.toLowerCase();
  const list=document.getElementById("searchList");
  if(!v){list.innerHTML="";return;}
  list.innerHTML=data.filter(d=>d.nama.toLowerCase().includes(v))
    .map(d=>`<div class="search-item" onclick="selectName('${d.nama}')">${d.nama}</div>`).join("");
}
function selectName(n){
  index=data.findIndex(d=>d.nama===n);
  document.getElementById("searchList").innerHTML="";
  render();
}

/* RENDER */
function render(){
  const d=data[index];
  const status=getStatus(d.nip);

  document.getElementById("app").innerHTML=`
  <div class="card">

    <div class="hidden-box" onclick="toggleInfo()">
      ${showInfo ? "Sembunyikan Info" : "👁 Tampilkan Data"}
    </div>

    ${showInfo?`
    <div class="show-box">
      <div class="no">${d.no}</div>
      <div class="name">${d.nama}</div>
      <div class="nip">
        <span>${d.nip}</span>
        <button class="btn" onclick="copy('${d.nip}')">Copy</button>
      </div>
    </div>`:""}

    <div class="pass">
      <span>${showPwd?d.password:"••••••"}</span>
      <div>
        <button class="btn" onclick="togglePwd()">👁</button>
        <button class="btn" onclick="copy('${d.password}')">📋</button>
      </div>
    </div>

    <div class="status ${status?'done':''}" onclick="toggleDone('${d.nip}')">
      ${status?"✔ "+status:"✔ Tandai selesai"}
    </div>

    <div class="task-title" onclick="toggleTask()">📋 Task</div>
    <div id="taskBox" class="task-list">
      ${task(d.task1)}
      ${task(d.task2)}
      ${task(d.task3)}
      ${task(d.task4)}
      ${task(d.task5)}
    </div>

    <div class="nav">
      <button onclick="prev()">⬅</button>
      <button onclick="next()">➡</button>
    </div>

  </div>`;
}

/* TOGGLE INFO */
function toggleInfo(){showInfo=!showInfo;render();}

/* TASK */
function task(v){
  if(!v)return"";
  return `<div class="task-item" onclick="copy('${v}')">${v}</div>`;
}
function toggleTask(){
  const e=document.getElementById("taskBox");
  e.style.display=e.style.display==="block"?"none":"block";
}

/* NAV */
function next(){if(index<data.length-1){index++;render();}}
function prev(){if(index>0){index--;render();}}

/* PASSWORD */
function togglePwd(){showPwd=!showPwd;render();}

/* COPY */
function copy(t){
  navigator.clipboard.writeText(t);
  toast("Copied");
}

/* TOAST */
function toast(m){
  const t=document.getElementById("toast");
  t.innerText=m;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
}
</script>

</body>
</html>
