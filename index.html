<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;font-family:system-ui}
body{margin:0;background:#f6f7fb;padding:10px}

/* TOP MENU */
.top{
  display:flex;
  gap:6px;
  margin-bottom:10px;
}
.top a{
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:10px;
  color:#fff;
  text-decoration:none;
  font-size:13px;
  font-weight:600;
}
.top a:nth-child(1){background:#4facfe;}
.top a:nth-child(2){background:#43e97b;}
.top a:nth-child(3){background:#f093fb;}

/* CARD */
.card{
  background:#fff;
  border-radius:14px;
  padding:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

/* TEXT */
h3{margin:0 0 8px;font-size:16px}

/* DATA BOX */
.box{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  border-radius:8px;
  margin-top:8px;
  font-size:13px;
}
.nip{background:#eef4ff}
.pass{background:#fff4e5}

.copy{
  background:#000;
  color:#fff;
  border:none;
  border-radius:6px;
  padding:5px 8px;
  font-size:12px;
}

/* STATUS */
.status{
  margin-top:12px;
  padding:12px;
  border-radius:10px;
  text-align:center;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
}
.today{background:#b388ff;color:#fff}
.old{background:#43e97b;color:#fff}

/* LAST */
.last{
  text-align:center;
  margin-top:8px;
  font-size:13px;
}

/* NAV */
.nav{
  display:flex;
  gap:6px;
  margin-top:12px;
}
.nav button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#4facfe;
  color:#fff;
}

/* RESPONSIVE */
@media(min-width:600px){
  body{max-width:420px;margin:auto}
}
</style>
</head>

<body>

<div class="top">
  <a href="https://aktivitas.kalbarprov.go.id//engine/feature26/data-kinerja/add#TakeOff" target="_blank">INPUT</a>
  <a href="https://epresensi.kalbarprov.go.id/login-general" target="_blank">JADWAL</a>
  <a href="https://script.google.com/macros/s/AKfycbwl9sC1tabi_-BC6vU2KFH1drCGPHwgmgIqNFks_ipCSxFCjH1NyxITPodOC4CWJwjJYQ/exec" target="_blank">SUKET</a>
</div>

<div id="app"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyz2FWhSfAiP6xuSjgdDk1p-BRlvvPeJl5W3oXSvxL5TNWHI0eAz7VQ1Wadee_PzqqRpg/exec";

let data=[],index=0;

/* LOAD */
fetch(API_URL)
.then(r=>r.json())
.then(r=>{
  data=r;
  render();
});

/* UTIL */
function now(){
  return new Date().toISOString();
}
function format(t){
  if(!t)return "-";
  return new Date(t).toLocaleString("id-ID");
}
function todayOnly(){
  return new Date().toISOString().split("T")[0];
}

/* COPY */
function copyText(text,el){
  navigator.clipboard.writeText(text);
  el.innerHTML="✔";
  setTimeout(()=>el.innerHTML="📋",1000);
}

/* UPDATE */
function toggleDone(nip){
  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      nip:nip,
      tanggal:now(),
      password:"timawakng"
    })
  })
  .then(()=>location.reload());
}

/* RENDER */
function render(){
  let d=data[index];
  let t=d.terakhir;
  let isToday=t && t.startsWith(todayOnly());

  document.getElementById("app").innerHTML=`
  <div class="card">

    <h3>${d.nama}</h3>

    <div class="box nip">
      ${d.nip}
      <button class="copy" onclick="copyText('${d.nip}',this)">📋</button>
    </div>

    <div class="box pass">
      ${d.password}
      <button class="copy" onclick="copyText('${d.password}',this)">📋</button>
    </div>

    <div class="status ${isToday?'today':'old'}" onclick="toggleDone('${d.nip}')">
      ${t ? "Terakhir Input" : "Klik untuk input hari ini"}
    </div>

    <div class="last">${format(t)}</div>

    <div class="nav">
      <button onclick="prev()">⬅</button>
      <button onclick="next()">➡</button>
    </div>

  </div>`;
}

/* NAV */
function next(){if(index<data.length-1){index++;render();}}
function prev(){if(index>0){index--;render();}}

</script>

</body>
</html>
