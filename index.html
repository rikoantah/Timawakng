<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;font-family:system-ui}

body{
  margin:0;
  background:#f5f7ff;
  padding:10px;
}

/* TOP BUTTON */
.top{
  display:flex;
  gap:6px;
  margin-bottom:10px;
}

.top a{
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:10px;
  background:#4facfe;
  color:#fff;
  text-decoration:none;
  font-size:13px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:12px;
  padding:14px;
  box-shadow:0 6px 15px rgba(0,0,0,.08);
}

/* NAME */
.name{
  font-weight:bold;
  font-size:15px;
}

.nip{
  font-size:12px;
  color:#666;
  display:flex;
  justify-content:space-between;
  margin-top:4px;
}

/* PASSWORD */
.pass{
  margin-top:10px;
  padding:8px;
  background:#eef3ff;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* BUTTON */
.btn{
  border:none;
  background:#4facfe;
  color:#fff;
  border-radius:6px;
  padding:4px 7px;
  font-size:11px;
}

/* TASK */
.task-title{
  margin-top:10px;
  font-size:13px;
  font-weight:bold;
  cursor:pointer;
  color:#4facfe;
}

.task-list{
  display:none;
  margin-top:6px;
}

.task-item{
  background:#fafbff;
  border:1px solid #eee;
  padding:6px;
  border-radius:6px;
  font-size:12px;
  margin-bottom:6px;
}

/* NAV */
.nav{
  display:flex;
  margin-top:10px;
}

.nav button{
  flex:1;
  margin:2px;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#4facfe;
  color:#fff;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:#fff;
  padding:8px 14px;
  border-radius:20px;
  opacity:0;
  transition:.3s;
}
.toast.show{opacity:1}
</style>
</head>

<body>

<!-- TOP MENU -->
<div class="top">
  <a href="https://aktivitas.kalbarprov.go.id//engine/feature26/data-kinerja/add#TakeOff" target="_blank">INPUT</a>
  <a href="https://epresensi.kalbarprov.go.id/login-general" target="_blank">JADWAL</a>
</div>

<div id="app">Loading...</div>
<div id="toast" class="toast"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzA3HAKr4ALmfHT0hpp3NCeuyp-P5lpZaczMOLyqVX8PZbblJPR7X4ksDvrOSAAQD3JWQ/exec";

let data = [];
let index = 0;
let showPwd = false;

/* LOAD DATA */
fetch(API_URL)
.then(res => res.json())
.then(res => {
  data = res;
  render();
});

/* RENDER */
function render(){
  const d = data[index];

  document.getElementById("app").innerHTML = `
  <div class="card">

    <div class="name">${d.nama}</div>

    <div class="nip">
      <span>${d.nip}</span>
      <button class="btn" onclick="copy('${d.nip}')">Copy</button>
    </div>

    <div class="pass">
      <span>${showPwd ? d.password : "••••••"}</span>
      <div>
        <button class="btn" onclick="togglePwd()">👁</button>
        <button class="btn" onclick="copy('${d.password}')">📋</button>
      </div>
    </div>

    <div class="task-title" onclick="toggleTask()">📋 Task</div>

    <div id="taskBox" class="task-list">
      ${task(d.task1)}
      ${task(d.task2)}
      ${task(d.task3)}
      ${task(d.task4)}
      ${task(d.task5)}
    </div>

    <div class="nav">
      <button onclick="prev()">⬅</button>
      <button onclick="next()">➡</button>
    </div>

  </div>
  `;
}

/* TASK ITEM */
function task(val){
  if(!val) return "";
  return `<div class="task-item" onclick="copy('${val}')">${val}</div>`;
}

/* TOGGLE TASK */
function toggleTask(){
  const el = document.getElementById("taskBox");
  el.style.display = el.style.display==="block" ? "none" : "block";
}

/* NAV */
function next(){
  if(index < data.length-1){
    index++;
    render();
  } else {
    toast("Data terakhir");
  }
}

function prev(){
  if(index > 0){
    index--;
    render();
  } else {
    toast("Data pertama");
  }
}

/* PASSWORD */
function togglePwd(){
  showPwd = !showPwd;
  render();
}

/* COPY */
function copy(text){
  navigator.clipboard.writeText(text);
  toast("Copied");
}

/* TOAST */
function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
}
</script>

</body>
</html>
